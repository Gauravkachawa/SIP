<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        .navbar{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
            background-color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .navleft, .nav-right{
            display: flex;
            align-items: center;
            gap: 16px;

        }

        .menu-btn{
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #6b6b6b;
        }

        .logo{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            font-weight: 700;
            font-size: 24px;
            color: #000;
            
            
        }

        .searchbox{
            display: flex;
            align-items: center;
            background: #f9f9f9;
            border-radius: 20px;
            padding: 6px 12px;
            gap: 6px;
        }

        .search-box input{
            border: none;
            background: none;
            outline: none;
            font-size: 13px;
            width: 140px;
        }

        .nav-link{
            display: flex;
            gap: 5px;
            align-items: center;
            text-decoration: none;
            font-size: 13px;
            color: #6b6b6b;
        }

        .get-app{
            background: #191919;
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;

        }

        .profile-btn{
            width: 28px;
            height: 28px;
            border-radius: 50px;
            background-color: #ffc017;
            border: none;
            font-weight: 600;
            font-size: 13px;
            color: #000;
            


        }

        @media(max-width:600px){
            .search-box input{
                width: 80px;
            }
            .write{
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
           <button class="menu-btn">☰</button>
           <div class="logo"><b>Medium</b></div>
           <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="Search">

           </div>

            

        </div>

        <div class="nav-right">
            <a href="#" class="nav-link get-app">
                <span>▦</span>Get App
            </a>
            <a href="#" class="nav-link-write">
                <span>✎</span>Write
            </a>
            <button class="profile-btn">P</button>
        </div>
    </nav>
    
    
</body>
</html>
