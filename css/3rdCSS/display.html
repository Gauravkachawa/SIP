<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        button{
            display: block;
        }

        div{
            border: 1px solid black;
            margin: 3px;
           
        }

        li{
            /* display: inline; */
            display: inline-block;
        }

        .hey{
            display: inline-block;
            border: 2px double red;
            margin: 20px;
            padding: 30px;
            
        }

        .hey:hover{
            background-color: aqua;

        }

        .hey:active{
            background-image: url(gpow5.jpg);
        }

        p{
            display: none;
        }


    </style>
</head>
<body>
    <button>1</button>
    <button>2</button>
    <button>3</button>

    <div>1</div>
    <div>2</div>
    <div>3</div>

    <li>a</li>
    <li>b</li>
    <li>c</li>

    <br>

    <span class="hey">Welcome</span>
    <br>

    <p>Its ok to start tomorrow</p>
</body>
</html>
