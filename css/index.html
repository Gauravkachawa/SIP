<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectors</title>
    <style>
        /* element selectors */
        div{
            color: aqua ;
        }

        h1{
            color: blue;
            text-align: center;
        }

        /* class selectors */
        .mkh {
            color: yellow;
        }

        /* id selectors */
        #sf{
            color: orangered;
        }

        /* universal Selectors */
        *{
            background-color: aqua;
        }

        #sam{
            background-image: url(gpow5.jpg);
            padding: 200px;
            margin: 100px;
            background-repeat: no-repeat;
        }


        
    </style>
</head>
<body>
    <h1>mnbvdfgh</h1>
    <div class="mkh">
        Main kaun hoon ?
    </div>
    <div id="sf">
        Sameer foodie
    </div>
    <div id="sam">Samiran</div>
</body>
</html>
