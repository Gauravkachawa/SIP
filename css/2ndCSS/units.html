<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul{
            list-style-type: armenian;
            font-size: 1cm;
        }

        .f{
            list-style-type: circle;
            font-size: 50px;
        }

        .D{
            list-style-type: square;
            font-size: 50mm;
        }

        .S{
            list-style-type: none;
            font-size: 1in;
        }

        .sd{
            list-style-type: decimal;
            font-size: 100%;
        }

        .sk{
            list-style-type: upper-roman;
            font-size: 10em;
        }

        .di{
            list-style-type: lower-alpha;
            font-size: 5rem;
        }

        .ag{
            list-style-type: lower-roman;
        }
    </style>
</head>
<body>
    <div>
        <ul>
            <li>Gaurav</li>
            <li class="f">Sameer</li>
            <li class="D">Samiran</li>
            <li class="S">Akhtar</li>
        </ul>
    </div>
    <div>
        <ol>
            <li class="sd">Sanjay dutt</li>
            <li class="sk">Salman khan</li>
            <li class="di">Dawood ibrahim</li>
            <li class="ag">Arun gawli</li>
        </ol>
    </div>
</body>
</html>
