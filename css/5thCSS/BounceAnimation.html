<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            background-color: black;
            
        }

        .container{
            display: flex;
            height: 100%;
            width: 100%;
            justify-content: center;
            align-items: center;
        }
        .box{
            
            border: 5px solid white;
            background-color: blue;
            height: 100px;
            width: 100px;
            border-radius: 300px;
            
            animation: moveBox 0.9s ease-in-out infinite;
        }

        @keyframes moveBox{
            0%{
                transform: translateY(0);
            }
            50%{
                transform: translateY(500px);
            }
            100%{
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
   <div class="container">
    <div class="box box1"></div>
    </div>
</body>
</html>
