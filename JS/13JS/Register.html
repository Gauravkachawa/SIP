<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Registration Form</h1>

    <form id="registrationForm">
        <label for=""'>Name</label>
        <input type="text" id="username" placeholder="Enter your name" required> <br>
        <label for="">Phone number</label>
        <input type="number" name="" id="" placeholder="Enter your number" required> <br>
        <label for="">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required> <br>
        <label for="">Password</label>
        <input type="password" id="password" password="Enter password" required> <br>
        <label for="">Gender</label> <br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other <br>
        <button>Register</button>

    </form>

        <script>
        const form = document.querySelector('form');
        
     
        form.addEventListener('submit', async function (e) {
            
            e.preventDefault(); 
            
            try {
                
                let users = JSON.parse(localStorage.getItem('allUsers'));

                
                const newUser = {
                    name: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                };

                users.push(newUser);
                localStorage.setItem('allUsers', JSON.stringify(users));
                
                
                // localStorage.setItem('currentUser', JSON.stringify(newUser));

                alert('Registered!');
                window.location.href = 'Main.html';
            } catch (err) {
                console.log(err);
            }
        });




    </script>





</body>
</html>
