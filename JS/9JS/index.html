<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document object Model</title>
</head>
<body>
    <div id="container">
    <h1>My name is anthony gonsalvez</h1>
    </div>
    <div class="ok">
        <p>I AM alone in this world</p>

    </div>
    

    <script>
        const a = document.getElementById("container");
        console.log(a)

        const b = document.getElementsByClassName("ok")
        console.log(b)
    </script>
</body>
</html>
